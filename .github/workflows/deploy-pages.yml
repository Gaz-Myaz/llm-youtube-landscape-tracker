name: Deploy dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update landscape data
    types:
      - completed

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: deploy-github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && format('refs/heads/{0}', github.event.workflow_run.head_branch) || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build static dashboard
        working-directory: apps/web
        env:
          DEPLOY_TARGET: github-pages
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Notify on Pages build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Investigate failed dashboard Pages deploy';
            const body = [
              'The GitHub Pages dashboard build failed before deployment.',
              '',
              `Event: ${context.eventName}`,
              `Ref: ${context.ref}`,
              `SHA: ${context.sha}`,
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify on Pages deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Investigate failed dashboard Pages deploy';
            const body = [
              'The GitHub Pages dashboard deploy job failed.',
              '',
              `Event: ${context.eventName}`,
              `Ref: ${context.ref}`,
              `SHA: ${context.sha}`,
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }