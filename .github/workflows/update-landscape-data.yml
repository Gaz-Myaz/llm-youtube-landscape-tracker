name: Update landscape data

on:
  workflow_dispatch:
    inputs:
      worker_provider:
        description: LLM provider for manual runs. Scheduled runs use Gemini.
        required: true
        default: mock
        type: choice
        options:
          - mock
          - gemini
          - openai
          - anthropic
      max_provider_calls_per_run:
        description: Maximum paid provider calls for this manual run.
        required: true
        default: "5"
        type: string
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: update-landscape-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker
        working-directory: services/worker
        run: pip install -e ".[dev]"

      - name: Test worker
        working-directory: services/worker
        run: pytest

      - name: Restore transcript cache
        uses: actions/cache@v4
        with:
          path: data/transcripts
          key: youtube-transcripts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            youtube-transcripts-${{ runner.os }}-

      - name: Prepare yt-dlp cookies
        env:
          YT_DLP_COOKIES: ${{ secrets.YT_DLP_COOKIES }}
        run: |
          if [ -n "$YT_DLP_COOKIES" ]; then
            printf '%s\n' "$YT_DLP_COOKIES" > .yt-dlp-cookies.raw.txt
            python .github/scripts/normalize_netscape_cookies.py .yt-dlp-cookies.raw.txt .yt-dlp-cookies.txt
            rm -f .yt-dlp-cookies.raw.txt
            echo "YT_DLP_COOKIES_PATH=$PWD/.yt-dlp-cookies.txt" >> "$GITHUB_ENV"
          fi

      - name: Validate yt-dlp cookies setup
        id: validate-cookies
        run: |
          if [ ! -s "$PWD/.yt-dlp-cookies.txt" ]; then
            echo "YT_DLP_COOKIES secret is missing or empty. Export a Netscape-format cookie file from a signed-in YouTube browser session and save it as the repository secret YT_DLP_COOKIES." >&2
            exit 1
          fi
          if ! grep -q "youtube\.com" "$PWD/.yt-dlp-cookies.txt"; then
            echo "YT_DLP_COOKIES does not appear to contain YouTube cookies. Re-export the cookie file in Netscape format and update the repository secret." >&2
            exit 1
          fi
          if ! validation_output="$(python -m yt_dlp --ignore-config --cookies "$PWD/.yt-dlp-cookies.txt" --skip-download --ignore-no-formats-error --list-subs "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 2>&1)"; then
            printf '%s\n' "$validation_output" >&2
            echo "YT_DLP_COOKIES could not be used by yt-dlp to fetch YouTube subtitle metadata. Re-export the cookies in raw Netscape format and update the repository secret." >&2
            exit 1
          fi
          if printf '%s\n' "$validation_output" | grep -qiE "provided YouTube account cookies are no longer valid|Sign in to confirm you're not a bot|Use --cookies-from-browser or --cookies for the authentication"; then
            printf '%s\n' "$validation_output" >&2
            echo "YT_DLP_COOKIES were parsed, but YouTube rejected the session. Re-export fresh cookies from a signed-in browser session and update the repository secret." >&2
            exit 1
          fi

      - name: Notify on cookie validation failure
        if: failure() && steps.validate-cookies.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Refresh YT_DLP_COOKIES for scheduled data updates';
            const body = [
              'The scheduled `Update landscape data` workflow could not validate the `YT_DLP_COOKIES` secret.',
              '',
              'Re-export a fresh Netscape-format cookie file from a signed-in YouTube browser session and update the repository secret named `YT_DLP_COOKIES`.',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            if (!issues.some((issue) => issue.title === title)) {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Validate LLM provider secret
        env:
          WORKER_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.worker_provider || 'gemini' }}
          GEMINI_API_KEY: ${{ secrets[format('{0}', 'GEMINI_API_KEY')] }}
          OPENAI_API_KEY: ${{ secrets[format('{0}', 'OPENAI_API_KEY')] }}
          ANTHROPIC_API_KEY: ${{ secrets[format('{0}', 'ANTHROPIC_API_KEY')] }}
        run: |
          case "$WORKER_PROVIDER" in
            mock)
              ;;
            gemini|google|google-gemini)
              if [ -z "$GEMINI_API_KEY" ]; then
                echo "GEMINI_API_KEY secret is required when WORKER_PROVIDER=$WORKER_PROVIDER." >&2
                exit 1
              fi
              ;;
            openai|openai-compatible|openai_compatible)
              if [ -z "$OPENAI_API_KEY" ]; then
                echo "OPENAI_API_KEY secret is required when WORKER_PROVIDER=$WORKER_PROVIDER." >&2
                exit 1
              fi
              ;;
            anthropic|claude)
              if [ -z "$ANTHROPIC_API_KEY" ]; then
                echo "ANTHROPIC_API_KEY secret is required when WORKER_PROVIDER=$WORKER_PROVIDER." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported WORKER_PROVIDER=$WORKER_PROVIDER." >&2
              exit 1
              ;;
          esac

      - name: Export snapshots
        env:
          VIDEOS_PER_CHANNEL: 2
          MAX_VIDEOS_PER_RUN: 30
          MAX_PROVIDER_CALLS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.max_provider_calls_per_run || '30' }}
          WORKER_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.worker_provider || 'gemini' }}
          GEMINI_API_KEY: ${{ secrets[format('{0}', 'GEMINI_API_KEY')] }}
          OPENAI_API_KEY: ${{ secrets[format('{0}', 'OPENAI_API_KEY')] }}
          ANTHROPIC_API_KEY: ${{ secrets[format('{0}', 'ANTHROPIC_API_KEY')] }}
          TRANSCRIPT_REQUEST_DELAY_SECONDS: 5.0
          TRANSCRIPT_PROVIDERS: yt_dlp,youtube_transcript_api
          TRANSCRIPT_CACHE_DIR: data/transcripts
          SNAPSHOT_OUTPUT_DIR: apps/web/public/data
          CONTRACTS_DIR: contracts
        run: python -m llm_landscape.main real-export

      - name: Validate snapshots
        env:
          SNAPSHOT_OUTPUT_DIR: apps/web/public/data
          CONTRACTS_DIR: contracts
        run: python -m llm_landscape.main validate-snapshots

      - name: Notify on degraded data refresh
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metadataPath = 'apps/web/public/data/run-metadata.json';
            const metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
            const fallbackCount = Number(metadata.provider_fallback_count || 0);
            const failedCount = Number(metadata.videos_failed || 0);
            const degraded = metadata.status !== 'success' || failedCount > 0 || fallbackCount > 0;
            if (!degraded) {
              return;
            }
            const title = 'Investigate degraded landscape data refresh';
            const body = [
              'The `Update landscape data` workflow completed, but the resulting snapshot is degraded.',
              '',
              `Status: ${metadata.status}`,
              `Provider: ${metadata.provider}`,
              `Model: ${metadata.model}`,
              `Videos seen: ${metadata.videos_seen}`,
              `Videos processed: ${metadata.videos_processed}`,
              `Videos failed/skipped: ${failedCount}`,
              `Provider fallbacks: ${fallbackCount}`,
              `Estimated cost: $${Number(metadata.estimated_cost_usd || 0).toFixed(6)}`,
              '',
              metadata.error_summary ? `Summary: ${metadata.error_summary}` : 'Summary: no error summary was recorded.',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web app with refreshed snapshots
        working-directory: apps/web
        run: npm run build

      - name: Commit updated snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update public snapshots"
          file_pattern: apps/web/public/data/*.json

      - name: Notify on data refresh failure
        if: failure() && steps.validate-cookies.outcome != 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Investigate failed landscape data refresh';
            const body = [
              'The `Update landscape data` workflow failed outside the cookie-validation alert path.',
              '',
              `Event: ${context.eventName}`,
              `Ref: ${context.ref}`,
              `SHA: ${context.sha}`,
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }