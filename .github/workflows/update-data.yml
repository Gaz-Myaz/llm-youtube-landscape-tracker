name: Update landscape data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: write

concurrency:
  group: update-landscape-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker
        working-directory: services/worker
        run: pip install -e ".[dev]"

      - name: Test worker
        working-directory: services/worker
        run: pytest

      - name: Restore transcript cache
        uses: actions/cache@v4
        with:
          path: data/transcripts
          key: youtube-transcripts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            youtube-transcripts-${{ runner.os }}-

      - name: Export snapshots
        env:
          VIDEOS_PER_CHANNEL: 3
          MAX_VIDEOS_PER_RUN: 15
          TRANSCRIPT_REQUEST_DELAY_SECONDS: 0.75
          TRANSCRIPT_PROVIDERS: youtube_transcript_api,yt_dlp
          TRANSCRIPT_CACHE_DIR: data/transcripts
          SNAPSHOT_OUTPUT_DIR: apps/web/public/data
          CONTRACTS_DIR: contracts
        run: python -m llm_landscape.main real-export

      - name: Validate snapshots
        env:
          SNAPSHOT_OUTPUT_DIR: apps/web/public/data
          CONTRACTS_DIR: contracts
        run: python -m llm_landscape.main validate-snapshots

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web app with refreshed snapshots
        working-directory: apps/web
        run: npm run build

      - name: Commit updated snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update public snapshots"
          file_pattern: apps/web/public/data/*.json
