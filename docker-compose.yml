services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_tracker
      POSTGRES_USER: llm_tracker
      POSTGRES_PASSWORD: llm_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./infra/db/seed_channels.sql:/docker-entrypoint-initdb.d/002_seed_channels.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_tracker -d llm_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./services/worker
    environment:
      SNAPSHOT_OUTPUT_DIR: /workspace/apps/web/public/data
      CONTRACTS_DIR: /workspace/contracts
      DATABASE_URL: postgresql://llm_tracker:llm_tracker@db:5432/llm_tracker
      MAX_VIDEOS_PER_RUN: 15
      VIDEOS_PER_CHANNEL: 3
      TRANSCRIPT_REQUEST_DELAY_SECONDS: 0.75
      TRANSCRIPT_PROVIDERS: youtube_transcript_api,yt_dlp
      TRANSCRIPT_CACHE_DIR: /workspace/data/transcripts
      SEED_CHANNELS_PATH: /workspace/infra/db/seed_channels.sql
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "llm_landscape.main", "real-export", "--output-dir", "/workspace/apps/web/public/data"]

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/public/data:/app/public/data:ro
    depends_on:
      - worker

volumes:
  postgres-data:
